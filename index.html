<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatariya — AI Ассистент</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #7C3AED;
      --primary-light: #A78BFA;
      --primary-bg: #F3F0FF;
      --accent: #F43F5E;
      --bg: #F5F3FF;
      --white: #FFFFFF;
      --text: #1E1B4B;
      --text-light: #6B7280;
      --border: #E5E7EB;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); height: 100%; color: var(--text); }

    #role-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; text-align: center; }
    .subtitle { color: var(--text-light); font-size: 1rem; margin-bottom: 40px; text-align: center; }
    .roles-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
    .roles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; width: 100%; max-width: 400px; }
    .role-card { background: var(--white); border: 2px solid var(--border); border-radius: 16px; padding: 26px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .role-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(124,58,237,0.15); }
    .role-card .icon { font-size: 2.2rem; margin-bottom: 10px; }
    .role-card .name { font-weight: 700; font-size: 1rem; }
    .role-card.full { grid-column: 1 / -1; }

    #chat-screen { display: none; flex-direction: column; height: 100vh; width: 100%; }
    .chat-header { background: linear-gradient(135deg, #7C3AED, #6D28D9); color: white; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.15); flex-shrink: 0; }
    .chat-header .left { display: flex; align-items: center; gap: 12px; }
    .header-avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .header-info h3 { font-size: 0.95rem; font-weight: 700; }
    .header-info p { font-size: 0.75rem; opacity: 0.75; }
    .change-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .change-btn:hover { background: rgba(255,255,255,0.35); }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .welcome { text-align: center; padding: 30px 20px; color: var(--text-light); }
    .welcome .big-icon { font-size: 3rem; margin-bottom: 14px; }
    .welcome h3 { font-size: 1.1rem; color: var(--text); font-weight: 700; margin-bottom: 6px; }
    .welcome p { font-size: 0.88rem; }

    .message { display: flex; gap: 8px; max-width: 90%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .msg-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .message.user .msg-av { background: var(--primary); }
    .message.bot .msg-av { background: #F3F0FF; border: 1px solid var(--border); }
    .msg-bubble { padding: 11px 15px; border-radius: 16px; font-size: 0.88rem; line-height: 1.6; }
    .message.user .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .message.bot .msg-bubble { background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .msg-bubble img { max-width: 100%; border-radius: 10px; margin: 8px 0; display: block; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li { margin: 4px 0; }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 5px; color: var(--primary); }
    .msg-bubble p { margin: 5px 0; }
    .msg-bubble details { background: var(--bg); border-radius: 10px; padding: 10px 14px; margin: 8px 0; border: 1px solid var(--border); }
    .msg-bubble summary { cursor: pointer; font-weight: 600; color: var(--primary); user-select: none; }
    .msg-bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.83rem; }
    .msg-bubble th, .msg-bubble td { padding: 7px 10px; border: 1px solid var(--border); }
    .msg-bubble th { background: var(--bg); font-weight: 700; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .msg-bubble code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.83em; }

    .sources { font-size: 0.73rem; color: var(--text-light); margin-top: 5px; padding-left: 40px; }
    .src-tag { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; margin: 2px 3px 2px 0; }

    .loading-dots { display: flex; gap: 5px; padding: 3px 0; }
    .loading-dots span { width: 7px; height: 7px; background: var(--primary-light); border-radius: 50%; animation: bounce 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

    .card-menu { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 14px; width: 100%; max-width: 360px; align-self: flex-start; }
    .card-menu-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; color: var(--text); }
    .card-menu-section { margin-bottom: 12px; }
    .card-menu-section-title { font-size: 0.78rem; font-weight: 600; color: var(--primary); margin-bottom: 7px; }
    .card-menu-items { display: flex; flex-wrap: wrap; gap: 6px; }
    .card-item-btn { background: var(--primary-bg); border: 1.5px solid var(--primary-light); color: #6D28D9; padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .card-item-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .quick-btns { padding: 10px 14px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; background: var(--white); border-top: 1px solid var(--border); scrollbar-width: none; }
    .quick-btns::-webkit-scrollbar { display: none; }
    .quick-btn { background: var(--white); border: 1.5px solid var(--primary-light); color: var(--primary); padding: 7px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; font-weight: 600; transition: all 0.2s; flex-shrink: 0; }
    .quick-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .input-area { padding: 12px 16px; background: var(--white); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    textarea { flex: 1; border: 1.5px solid var(--border); border-radius: 14px; padding: 10px 14px; font-size: 0.88rem; resize: none; min-height: 44px; max-height: 110px; outline: none; font-family: inherit; transition: border-color 0.2s; background: var(--bg); }
    textarea:focus { border-color: var(--primary); background: white; }
    textarea::placeholder { color: var(--text-light); }
    .send-btn { width: 44px; height: 44px; background: var(--primary); border: none; border-radius: 12px; color: white; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:hover { background: #6D28D9; }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .attach-btn { width: 44px; height: 44px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--primary); font-size: 1.2rem; cursor: pointer; flex-shrink: 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .attach-btn:hover { background: var(--primary-bg); border-color: var(--primary); }
    .upload-panel { padding: 8px 14px; background: var(--primary-bg); border-top: 1px solid var(--border); display: none; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .upload-file-name { font-size: 0.82rem; font-weight: 600; color: var(--primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .upload-action-btn { background: var(--primary); color: white; border: none; padding: 6px 13px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
    .upload-action-btn:hover { background: #6D28D9; }
    .upload-clear-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 1.1rem; padding: 0 4px; line-height: 1; }


    .bottom-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
    .bottom-tab { flex: 1; padding: 9px 0; font-size: 0.78rem; font-weight: 700; border: none; cursor: pointer; border-bottom: 2.5px solid transparent; color: var(--text-light); background: var(--white); transition: all 0.15s; }
    .bottom-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tools-grid { padding: 8px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; max-height: 175px; overflow-y: auto; flex-shrink: 0; background: var(--white); }
    .tool-card { background: var(--primary-bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px; cursor: pointer; text-align: left; transition: border-color 0.15s; }
    .tool-card:hover { border-color: var(--primary-light); }
    .tool-card .t-icon { font-size: 1.2rem; margin-bottom: 3px; }
    .tool-card .t-title { font-size: 0.72rem; font-weight: 700; color: var(--text); line-height: 1.3; }
    .tool-card .t-desc { font-size: 0.65rem; color: var(--text-light); line-height: 1.3; margin-top: 2px; }
    .compare-panel { padding: 10px 14px; background: var(--primary-bg); border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .compare-drop { border: 1.5px dashed var(--primary-light); border-radius: 8px; padding: 10px 12px; cursor: pointer; font-size: 0.78rem; color: var(--text-light); background: var(--white); display: block; transition: all 0.15s; }
    .compare-drop.loaded { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
    .compare-drop input { display: none; }
    .compare-actions { display: flex; gap: 8px; }
    .compare-go-btn { flex: 1; background: var(--primary); color: white; border: none; padding: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .compare-go-btn:disabled { background: var(--border); cursor: not-allowed; }
    .compare-cancel-btn { background: var(--white); border: 1px solid var(--border); color: var(--primary); padding: 8px 12px; border-radius: 8px; font-size: 0.78rem; cursor: pointer; }

    @media (max-width: 600px) {
      .message { max-width: 95%; }
      .roles-grid { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="role-screen">
  <div class="logo">✨ Avatariya AI</div>
  <p class="subtitle">Умный ассистент для сотрудников парка</p>
  <p class="roles-title">Выбери свою роль:</p>
  <div class="roles-grid">
    <div class="role-card" onclick="selectRole('cashier','🎟️','Кассир')">
      <div class="icon">🎟️</div><div class="name">Кассир</div>
    </div>
    <div class="role-card" onclick="selectRole('operator','🎡','Оператор')">
      <div class="icon">🎡</div><div class="name">Оператор</div>
    </div>
    <div class="role-card" onclick="selectRole('waiter','🍽️','Официант')">
      <div class="icon">🍽️</div><div class="name">Официант</div>
    </div>
    <div class="role-card" onclick="selectRole('barmen','🍹','Бармен')">
      <div class="icon">🍹</div><div class="name">Бармен</div>
    </div>
    <div class="role-card full" onclick="selectRole('hr','👥','HR')">
      <div class="icon">👥</div><div class="name">HR</div>
    </div>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="left">
      <div class="header-avatar" id="hdr-icon">🎟️</div>
      <div class="header-info">
        <h3 id="hdr-role">Кассир</h3>
        <p>Avatariya AI · онлайн</p>
      </div>
    </div>
    <button class="change-btn" onclick="changeRole()">← Сменить роль</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome-block">
      <div class="big-icon" id="welcome-icon">⭐</div>
      <h3>Привет! Я твой AI-ассистент</h3>
      <p>Нажми на кнопку ниже или задай вопрос</p>
    </div>
  </div>

  <input type="file" id="file-input" style="display:none" accept=".pdf,.docx,.doc,.txt,.xlsx,.csv,.xls" onchange="handleFileSelect(event)">
  <input type="file" id="file-input-2" style="display:none" accept=".pdf,.docx,.doc,.txt" onchange="handleFileSelect2(event)">

  <!-- Upload panel (single file) -->
  <div class="upload-panel" id="upload-panel">
    <span style="font-size:1.1rem;flex-shrink:0">📎</span>
    <span class="upload-file-name" id="upload-filename"></span>
    <button class="upload-action-btn" id="btn-summarize" onclick="analyzeUploadedFile('summarize')">📋 Краткое резюме</button>
    <button class="upload-action-btn" id="btn-contract" onclick="analyzeUploadedFile('contract')">📄 Анализ</button>
    <button class="upload-action-btn" id="btn-excel" onclick="analyzeUploadedFile('excel')" style="display:none">📊 Анализ таблицы</button>
    <button class="upload-clear-btn" onclick="clearUpload()">✕</button>
  </div>

  <!-- Compare panel (two files) -->
  <div class="compare-panel" id="compare-panel">
    <div style="font-size:0.82rem;font-weight:700;color:var(--primary)">🔀 Сравнение документов</div>
    <label class="compare-drop" id="compare-drop-1">
      <span id="compare-name-1">📎 Первый документ — нажми чтобы выбрать</span>
      <input type="file" accept=".pdf,.docx,.doc,.txt" onchange="handleCompareFile(event,1)">
    </label>
    <label class="compare-drop" id="compare-drop-2">
      <span id="compare-name-2">📎 Второй документ — нажми чтобы выбрать</span>
      <input type="file" accept=".pdf,.docx,.doc,.txt" onchange="handleCompareFile(event,2)">
    </label>
    <div class="compare-actions">
      <button class="compare-go-btn" id="compare-go-btn" onclick="runCompare()" disabled>🔀 Сравнить</button>
      <button class="compare-cancel-btn" onclick="closeCompare()">Отмена</button>
    </div>
    <div style="font-size:0.7rem;color:var(--text-light);text-align:center" id="compare-hint">Загрузи оба файла чтобы активировать</div>
  </div>

  <!-- Bottom tabs -->
  <div class="bottom-tabs" id="bottom-tabs">
    <button class="bottom-tab active" id="tab-quick" onclick="switchTab('quick')">⚡ Быстрые</button>
    <button class="bottom-tab" id="tab-tools" onclick="switchTab('tools')">🛠️ Инструменты</button>
  </div>

  <!-- Quick buttons panel -->
  <div class="quick-btns" id="quick-btns"></div>

  <!-- Tools grid panel -->
  <div class="tools-grid" id="tools-grid" style="display:none">
    <button class="tool-card" onclick="toolAction('summarize')">
      <div class="t-icon">📋</div>
      <div class="t-title">Краткое резюме</div>
      <div class="t-desc">Загрузи документ → главное за 1 мин</div>
    </button>
    <button class="tool-card" onclick="toolAction('analyze')">
      <div class="t-icon">📄</div>
      <div class="t-title">Анализ документа</div>
      <div class="t-desc">Права, обязанности, риски по роли</div>
    </button>
    <button class="tool-card" onclick="toolAction('compare')">
      <div class="t-icon">🔀</div>
      <div class="t-title">Сравнить 2 документа</div>
      <div class="t-desc">Загрузи два файла → найди отличия</div>
    </button>
    <button class="tool-card" onclick="toolAction('excel')">
      <div class="t-icon">📊</div>
      <div class="t-title">Анализ таблицы</div>
      <div class="t-desc">Excel/CSV → ошибки и аномалии</div>
    </button>
    <button class="tool-card" onclick="toolAction('write')">
      <div class="t-icon">✍️</div>
      <div class="t-title">Написать документ</div>
      <div class="t-desc">Письмо, записка, ответ клиенту</div>
    </button>
    <button class="tool-card" onclick="toolAction('advice')">
      <div class="t-icon">💡</div>
      <div class="t-title">Советы</div>
      <div class="t-desc">Подскажу как действовать в ситуации</div>
    </button>
  </div>

  <div class="input-area">
    <button class="attach-btn" onclick="openFileDialog()" title="Загрузить документ">📎</button>
    <textarea id="input" placeholder="Задай вопрос..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const BAR_MENU = [
    {
      cat: "🍋 Лимонады",
      items: ["Манго маракуйя","Цитрусовый","Лесные ягоды","Киви Лайм","Мохито"]
    },
    {
      cat: "🧋 Айс-ти",
      items: ["Айс-ти Манго-маракуйя","Айс-ти Лесные ягоды","Айс-ти Киви-Лайм","Айс-ти Мохито","Айс-ти Цитрусовый"]
    },
    {
      cat: "🫷 Бабл Ти и Бабл Джус",
      items: ["Бабл Ти Личи-Карамель","Бабл Ти Манго-Ананас","Бабл Джус Яблоко-Киви","Бабл Джус Ягодный"]
    },
    {
      cat: "🥛 Молочные коктейли",
      items: ["Молочный коктейль Шоколадный","Молочный коктейль Ванильный"]
    },
    {
      cat: "☕ Кофе",
      items: ["Американо","Американо с молоком","Капучино","Латте","Эспрессо","Двойной эспрессо"]
    },
    {
      cat: "🍵 Чай горячий",
      items: ["Ташкентский чай","Марокканский чай","Чай манго-маракуйя","Чай Лесные ягоды","Классический черный чай","Классический зеленый чай"]
    },
    {
      cat: "🥤 Другие напитки",
      items: ["Клюквенный морс","Компот из сухофруктов","Coca Cola","Sprite","Fanta"]
    }
  ];

  const ATTRACTIONS = [
    "🛡️ Батутная арена",
    "🏔️ Горка Алатау",
    "🛷 Тюбинг",
    "🌊 Эверест",
    "🪂 Тарзанка",
    "🧗 Скалодром"
  ];

  // ─── КНОПКИ ПО РОЛЯМ ───
  // 5-минутка: ТОЛЬКО у HR!
  // У официанта и бармена — нет
  const ROLE_BUTTONS = {
    cashier: [
      { label: "📱 Мобильное приложение", query: "Инструкция по мобильному приложению" },
      { label: "🎫 Промокоды", query: "Как пробить промокод одноразовый и многоразовый?" },
      { label: "🧹 Стандарт чистоты", query: "Стандарт чистоты" },
      { label: "🍽️ Ванпейдж (меню) Аватария", query: "бургер пицца меню блюда Ванпейдж" },
      { label: "📲 Авики", query: "Как накопить и потратить Авики на кассе?" },
    ],
    operator: [
      { label: "🎪 Аттракционы", action: "attractions" },
      { label: "📋 Памятка оператора", query: "Памятка для операторов правила браслеты" },
      { label: "🗣️ Скрипт входа (RU)", query: "Скрипт оператора входа русский" },
      { label: "🗣️ Скрипт входа (KZ)", query: "Скрипт оператора входа казахский" },
      { label: "📖 Книга операторов", query: "Книга операторов парка" },
      { label: "🍽️ Ванпейдж (меню) Аватария", query: "бургер пицца меню блюда Ванпейдж" },
    ],
    waiter: [
      { label: "🔄 Ротация официантов", query: "Регламент ротации официантов нормы столов" },
      { label: "🏪 Зона самообслуживания", action: "selfservice" },
      { label: "📖 Книга официантов", query: "Книга официантов стандарты обслуживания" },
      { label: "🍽️ Ванпейдж (меню) Аватария", query: "бургер пицца меню блюда Ванпейдж" },
    ],
    barmen: [
      { label: "📋 Барная карта", action: "barcard" },
      { label: "📄 Закрывашки", query: "Закрывашки для бухгалтерии" },
      { label: "🧪 Химия для кухни и бара", query: "Производственные зоны химия кухня бар" },
      { label: "🍽️ Ванпейдж (меню) Аватария", query: "бургер пицца меню блюда Ванпейдж" },
    ],
    hr: [
      { label: "📊 Механика адаптации", query: "Механика адаптации грейдирования аттестации" },
      { label: "📈 Карьерное развитие", query: "Карьерное развитие в Avatariya" },
      { label: "🎯 5-минутка официантов", query: "Сценарий 5-минутки официантов" },
      { label: "🎯 5-минутка барменов", query: "Сценарий 5-минутки барменов" },
      { label: "🎯 5-минутка операторов", query: "Сценарий 5-минутки операторов" },
    ]
  };

  const SELF_SERVICE = [
    { label: "📋 Алгоритм работы", query: "Алгоритм работы зоны самообслуживания" },
    { label: "🚨 Антикризисный алгоритм", query: "Антикризисный алгоритм зоны самообслуживания" },
  ];

  let currentRole = null;
  let loading = false;

  function selectRole(role, icon, name) {
    currentRole = { role, icon, name };
    document.getElementById('role-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('hdr-icon').textContent = icon;
    document.getElementById('hdr-role').textContent = name;
    document.getElementById('welcome-icon').textContent = icon;
    renderQuickBtns();
    document.getElementById('input').focus();
  }

  function renderQuickBtns() {
    const container = document.getElementById('quick-btns');
    container.innerHTML = '';
    const btns = ROLE_BUTTONS[currentRole.role] || [];
    btns.forEach(btn => {
      const el = document.createElement('button');
      el.className = 'quick-btn';
      el.textContent = btn.label;
      if (btn.action) {
        el.onclick = () => handleAction(btn.action, btn.label);
      } else {
        el.onclick = () => { quickSend(btn.query, btn.label); };
      }
      container.appendChild(el);
    });
  }

  function handleAction(action, label) {
    removeWelcome();
    addUserBubble(label);
    if (action === 'barcard') showBarCard();
    else if (action === 'attractions') showAttractions();
    else if (action === 'selfservice') showSelfService();
  }

  function showBarCard() {
    const wrap = document.createElement('div');
    wrap.className = 'card-menu';
    let html = `<div class="card-menu-title">📋 Барная карта Avatariya</div>`;
    BAR_MENU.forEach(section => {
      html += `<div class="card-menu-section">
        <div class="card-menu-section-title">${section.cat}</div>
        <div class="card-menu-items">
          ${section.items.map(item =>
            `<button class="card-item-btn" onclick="quickSend('Рецепт ${item}','${item}')">${item}</button>`
          ).join('')}
        </div>
      </div>`;
    });
    wrap.innerHTML = html;
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function showAttractions() {
    const wrap = document.createElement('div');
    wrap.className = 'card-menu';
    let html = `<div class="card-menu-title">🎪 Инструкции по аттракционам</div>
      <div class="card-menu-section">
        <div class="card-menu-section-title">Выбери аттракцион:</div>
        <div class="card-menu-items">
          ${ATTRACTIONS.map(a =>
            `<button class="card-item-btn" onclick="quickSend('Инструкция оператора ${a.replace(/^[^\s]+\s/,'')}','${a}')">${a}</button>`
          ).join('')}
        </div>
      </div>`;
    wrap.innerHTML = html;
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function showSelfService() {
    const wrap = document.createElement('div');
    wrap.className = 'card-menu';
    let html = `<div class="card-menu-title">🏪 Зона самообслуживания</div>
      <div class="card-menu-section">
        <div class="card-menu-items">
          ${SELF_SERVICE.map(s =>
            `<button class="card-item-btn" onclick="quickSend('${s.query}','${s.label}')">${s.label}</button>`
          ).join('')}
        </div>
      </div>`;
    wrap.innerHTML = html;
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function quickSend(query, label) {
    document.getElementById('input').value = query;
    sendMessage(label);
  }

  function changeRole() {
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('role-screen').style.display = 'flex';
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome-block">
        <div class="big-icon" id="welcome-icon">⭐</div>
        <h3>Привет! Я твой AI-ассистент</h3>
        <p>Нажми на кнопку ниже или задай вопрос</p>
      </div>`;
    document.getElementById('quick-btns').innerHTML = '';
    currentRole = null;
  }

  function removeWelcome() {
    const w = document.getElementById('welcome-block');
    if (w) w.remove();
  }

  function addUserBubble(text) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:flex-end;';
    wrap.innerHTML = `<div style="background:#7C3AED;color:white;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:0.88rem;max-width:80%;">${text}</div>`;
    container.appendChild(wrap);
    scrollBottom();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function addBotMsg(answer, sources) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-self:flex-start;max-width:92%;';
    const html = marked.parse(answer);
    const srcHtml = sources && sources.length
      ? `<div class="sources">📚 ${sources.map(s=>`<span class="src-tag">${s}</span>`).join('')}</div>` : '';
    wrap.innerHTML = `
      <div class="message bot">
        <div class="msg-av">🤖</div>
        <div class="msg-bubble">${html}</div>
      </div>${srcHtml}`;
    container.appendChild(wrap);
    scrollBottom();
  }

  async function sendMessage(displayText) {
    if (loading || !currentRole) return;
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message) return;

    const label = displayText || message;
    input.value = '';
    input.style.height = 'auto';
    loading = true;
    document.getElementById('send-btn').disabled = true;

    removeWelcome();
    addUserBubble(label);

    const container = document.getElementById('messages');
    const loadWrap = document.createElement('div');
    loadWrap.id = 'loading-msg';
    loadWrap.style.cssText = 'display:flex;align-self:flex-start;';
    loadWrap.innerHTML = `
      <div class="message bot">
        <div class="msg-av">🤖</div>
        <div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    container.appendChild(loadWrap);
    scrollBottom();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, role: currentRole.role })
      });
      const data = await res.json();
      document.getElementById('loading-msg')?.remove();
      addBotMsg(data.answer || 'Не удалось получить ответ.', data.sources || []);
    } catch {
      document.getElementById('loading-msg')?.remove();
      addBotMsg('⚠️ Ошибка соединения. Проверь интернет и попробуй снова.');
    }

    loading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('input').focus();
  }

  // ── ЗАГРУЗКА ДОКУМЕНТОВ ──────────────────────────────────────────
  let uploadedFile = null;

  function openFileDialog() {
    document.getElementById('file-input').click();
  }

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    uploadedFile = file;
    document.getElementById('upload-panel').style.display = 'flex';
    document.getElementById('upload-filename').textContent = file.name;
    const isExcel = /\.xlsx$|\.csv$|\.xls$/i.test(file.name);
    document.getElementById('btn-summarize').style.display = isExcel ? 'none' : '';
    document.getElementById('btn-contract').style.display = isExcel ? 'none' : '';
    document.getElementById('btn-excel').style.display = isExcel ? '' : 'none';
    event.target.value = '';
  }

  function clearUpload() {
    uploadedFile = null;
    document.getElementById('upload-panel').style.display = 'none';
  }

  function parseExpertText(result) {
    if (!result) return '⚠️ Нет результата';
    const s = typeof result === 'string' ? result : JSON.stringify(result);
    const fields = ['text', 'analysis', 'summary', 'advice', 'comparison', 'document'];
    for (const field of fields) {
      const marker = "'" + field + "': '";
      const idx = s.indexOf(marker);
      if (idx !== -1) {
        const start = idx + marker.length;
        let end = start;
        while (end < s.length) {
          if (s[end] === '\\') { end += 2; continue; }
          if (s[end] === "'") break;
          end++;
        }
        return s.slice(start, end)
          .replace(/\\n/g, '\n')
          .replace(/\\'/g, "'")
          .replace(/\\"/g, '"');
      }
    }
    return s.length > 2000 ? s.slice(0, 2000) + '...' : s;
  }

  // Role labels for upload context
  const ROLE_LABELS = {
    cashier: 'кассира',
    waiter: 'официанта',
    barmen: 'бармена',
    operator: 'оператора',
    hr: 'HR-специалиста'
  };

  async function analyzeUploadedFile(mode) {
    if (!uploadedFile || loading) return;
    loading = true;
    document.getElementById('send-btn').disabled = true;
    const role = currentRole ? currentRole.role : '';
    const roleLabel = ROLE_LABELS[role] || '';
    const labels = {
      summarize: '📋 Краткое резюме',
      contract: '📝 Анализ документа',
      excel: '📊 Анализ таблицы',
      write: '✍️ Написать документ'
    };
    removeWelcome();
    addUserBubble('📎 ' + uploadedFile.name + ' — ' + labels[mode] + (roleLabel ? ' для ' + roleLabel : ''));
    const container = document.getElementById('messages');
    const loadWrap = document.createElement('div');
    loadWrap.id = 'loading-msg';
    loadWrap.style.cssText = 'display:flex;align-self:flex-start;';
    loadWrap.innerHTML = '<div class="message bot"><div class="msg-av">🤖</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>';
    container.appendChild(loadWrap);
    scrollBottom();

    const reader = new FileReader();
    reader.onload = async (e) => {
      const b64 = e.target.result.split(',')[1];
      const expertMap = {
        summarize: 'summarize_document',
        contract: 'analyze_contract',
        excel: 'analyze_excel_data'
      };
      const params = {
        document_base64: b64,
        file_name: uploadedFile.name,
        role: role
      };
      if (mode === 'excel') {
        params.question = 'Найди аномалии, дубли и ошибки заполнения. Дай общую оценку данных.';
      }
      try {
        const res = await fetch('/.netlify/functions/expert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ expert_name: expertMap[mode], params })
        });
        const data = await res.json();
        document.getElementById('loading-msg')?.remove();
        const text = data.text || parseExpertText(data.result || '');
        addBotMsg(text || '⚠️ Не удалось получить результат', [uploadedFile.name]);
      } catch(err) {
        document.getElementById('loading-msg')?.remove();
        addBotMsg('⚠️ Ошибка при анализе: ' + err.message, []);
      }
      loading = false;
      document.getElementById('send-btn').disabled = false;
      clearUpload();
    };
    reader.readAsDataURL(uploadedFile);
  }


  // ── TABS ──────────────────────────────────────────────────────────
  let currentTab = 'quick';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-quick').classList.toggle('active', tab === 'quick');
    document.getElementById('tab-tools').classList.toggle('active', tab === 'tools');
    document.getElementById('quick-btns').style.display = tab === 'quick' ? 'flex' : 'none';
    document.getElementById('tools-grid').style.display = tab === 'tools' ? 'grid' : 'none';
  }

  // ── TOOL ACTIONS ──────────────────────────────────────────────────
  function toolAction(action) {
    if (action === 'compare') {
      document.getElementById('compare-panel').style.display = 'flex';
      document.getElementById('upload-panel').style.display = 'none';
      switchTab('quick');
      return;
    }
    if (action === 'write') {
      removeWelcome();
      addUserBubble('✍️ Написать документ');
      addBotMsg('Конечно! Скажи что нужно написать:\n\n— Письмо\n— Служебная записка\n— Ответ клиенту\n— Регламент или инструкция\n\nПример: *«Напиши служебную записку об опоздании»*', []);
      switchTab('quick');
      return;
    }
    if (action === 'advice') {
      removeWelcome();
      addUserBubble('💡 Советы');
      addBotMsg('Опиши ситуацию — дам пошаговый совет!\n\nНапример:\n— «Гость недоволен, что делать?»\n— «Как передать столы при смене?»\n— «Что делать если терминал завис?»', []);
      switchTab('quick');
      return;
    }
    // summarize, analyze, excel — open file dialog
    document.getElementById('file-input').click();
    switchTab('quick');
  }

  // ── COMPARE ───────────────────────────────────────────────────────
  let compareFile1 = null;
  let compareFile2 = null;
  let compareFile1Name = '';
  let compareFile2Name = '';

  function handleCompareFile(event, num) {
    const file = event.target.files[0];
    if (!file) return;
    const drop = document.getElementById('compare-drop-' + num);
    const nameEl = document.getElementById('compare-name-' + num);
    drop.classList.add('loaded');
    nameEl.textContent = '✅ ' + file.name;
    if (num === 1) { compareFile1 = file; compareFile1Name = file.name; }
    else { compareFile2 = file; compareFile2Name = file.name; }
    const both = compareFile1 && compareFile2;
    document.getElementById('compare-go-btn').disabled = !both;
    document.getElementById('compare-hint').textContent = both ? 'Готово! Нажми «Сравнить»' : 'Загрузи оба файла чтобы активировать';
    event.target.value = '';
  }

  function closeCompare() {
    document.getElementById('compare-panel').style.display = 'none';
    compareFile1 = null; compareFile2 = null;
    compareFile1Name = ''; compareFile2Name = '';
    document.getElementById('compare-drop-1').classList.remove('loaded');
    document.getElementById('compare-drop-2').classList.remove('loaded');
    document.getElementById('compare-name-1').textContent = '📎 Первый документ — нажми чтобы выбрать';
    document.getElementById('compare-name-2').textContent = '📎 Второй документ — нажми чтобы выбрать';
    document.getElementById('compare-go-btn').disabled = true;
  }

  async function runCompare() {
    if (!compareFile1 || !compareFile2 || loading) return;
    loading = true;
    document.getElementById('send-btn').disabled = true;
    removeWelcome();
    addUserBubble('🔀 Сравниваю: ' + compareFile1Name + ' и ' + compareFile2Name);
    document.getElementById('compare-panel').style.display = 'none';

    const container = document.getElementById('messages');
    const loadWrap = document.createElement('div');
    loadWrap.id = 'loading-msg';
    loadWrap.style.cssText = 'display:flex;align-self:flex-start;';
    loadWrap.innerHTML = '<div class="message bot"><div class="msg-av">🤖</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>';
    container.appendChild(loadWrap);
    scrollBottom();

    const toBase64 = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    try {
      const [b64_1, b64_2] = await Promise.all([toBase64(compareFile1), toBase64(compareFile2)]);
      const role = currentRole ? currentRole.role : '';
      const res = await fetch('/.netlify/functions/expert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          expert_name: 'compare_documents',
          params: {
            document_base64_1: b64_1,
            file_name_1: compareFile1Name,
            document_base64_2: b64_2,
            file_name_2: compareFile2Name,
            role: role
          }
        })
      });
      const data = await res.json();
      document.getElementById('loading-msg')?.remove();
      const text = data.text || parseExpertText(data.result || '');
      addBotMsg(text || '⚠️ Не удалось сравнить документы', [compareFile1Name, compareFile2Name]);
    } catch(err) {
      document.getElementById('loading-msg')?.remove();
      addBotMsg('⚠️ Ошибка при сравнении: ' + err.message, []);
    }

    loading = false;
    document.getElementById('send-btn').disabled = false;
    closeCompare();
  }

</script>
